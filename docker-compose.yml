services:
  mariadb:
    image: mariadb:10.11
    container_name: zabbix-mariadb
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-zabbix}
      MYSQL_USER: ${MYSQL_USER:-zabbix}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-zabbixpassword}
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - zabbix-net
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  zabbix-server:
    image: zabbix/zabbix-server-mysql:ubuntu-7.0-latest
    container_name: zabbix-server
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      DB_SERVER_HOST: mariadb
      DB_SERVER_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE:-zabbix}
      MYSQL_USER: ${MYSQL_USER:-zabbix}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-zabbixpassword}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      ZBX_ENABLE_SNMP_TRAPS: "true"
    ports:
      - "10051:10051"
    volumes:
      - zabbix_server_data:/var/lib/zabbix
      - zabbix_snmptraps:/var/lib/zabbix/snmptraps
      - zabbix_export:/var/lib/zabbix/export
    networks:
      - zabbix-net
    healthcheck:
      test: ["CMD", "zabbix_server", "--version"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  zabbix-web-apache:
    image: zabbix/zabbix-web-apache-mysql:ubuntu-7.0-latest
    container_name: zabbix-web
    restart: unless-stopped
    depends_on:
      zabbix-server:
        condition: service_healthy
    environment:
      ZBX_SERVER_HOST: zabbix-server
      ZBX_SERVER_PORT: 10051
      DB_SERVER_HOST: mariadb
      DB_SERVER_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE:-zabbix}
      MYSQL_USER: ${MYSQL_USER:-zabbix}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-zabbixpassword}
      PHP_TZ: ${PHP_TZ:-America/Sao_Paulo}
    ports:
      - "8080:8080"
      - "8443:8443"
    volumes:
      - ./:/usr/share/zabbix/modules/TurnosNocReport:ro
    networks:
      - zabbix-net

volumes:
  mariadb_data:
  zabbix_server_data:
  zabbix_snmptraps:
  zabbix_export:

networks:
  zabbix-net:
    driver: bridge
